openapi: 3.0.3
info:
  title: AnyFast API
  version: 1.0.0
  description: Shared API contract for the AnyFast full-stack application.
servers:
  - url: http://localhost:8000
    description: Local backend development server
tags:
  - name: libraries
    description: Frontend library dashboard APIs.
  - name: auth
    description: Authentication and authorization APIs.
  - name: research
    description: Research workflow and agent APIs.
  - name: projects
    description: Project management APIs.
  - name: tasks
    description: Task planning and execution APIs.
paths:
  /api/libraries:
    get:
      tags:
        - libraries
      summary: List libraries for the frontend dashboard
      operationId: listFrontendLibraries
      responses:
        "200":
          description: Frontend library summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibrarySummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - libraries
      summary: Create a library from the frontend create modal
      operationId: createFrontendLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryRequest"
      responses:
        "201":
          description: Created library and frontend redirect target.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLibraryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/LibraryAlreadyExistsError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents:
    get:
      tags:
        - libraries
      summary: List frontend document workspace data for one library
      operationId: listFrontendLibraryDocuments
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
      responses:
        "200":
          description: Document workspace summary and rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentsWorkspace"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents/{documentId}:
    get:
      tags:
        - libraries
      summary: Get frontend document detail drawer data
      operationId: getFrontendLibraryDocument
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          example: doc-001
      responses:
        "200":
          description: Document detail data for the frontend drawer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents/{documentId}:retry:
    post:
      tags:
        - libraries
      summary: Queue a frontend document ingestion retry
      operationId: retryFrontendLibraryDocumentIngestion
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          example: doc-001
      responses:
        "202":
          description: Retry was accepted and queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentMutationFeedback"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents:upload:
    post:
      tags:
        - libraries
      summary: Upload one or more PDF documents for frontend ingestion
      operationId: uploadFrontendLibraryDocuments
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUploadRequest"
      responses:
        "202":
          description: Upload was accepted and queued for ingestion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentMutationFeedback"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "413":
          $ref: "#/components/responses/PayloadTooLargeError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaTypeError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    LibrarySummary:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - documentCountLabel
        - chunkCountLabel
        - entityCountLabel
        - activityLabel
        - statusLabel
        - status
        - accent
      properties:
        id:
          type: string
          description: Stable library slug used in frontend routes.
          example: graphrag-survey
        name:
          type: string
          example: GraphRAG Survey
        documentCountLabel:
          type: string
          description: Display-ready document count label.
          example: 0 documents
        chunkCountLabel:
          type: string
          description: Display-ready chunk count label.
          example: 0 chunks
        entityCountLabel:
          type: string
          description: Display-ready entity count label.
          example: 0 entities
        activityLabel:
          type: string
          description: Display-ready recent activity label.
          example: Created 2026-05-27
        statusLabel:
          type: string
          example: Healthy
        status:
          type: string
          enum:
            - healthy
            - indexing
        accent:
          type: string
          enum:
            - concept
            - method
            - dataset
            - citation
            - author
        featured:
          type: boolean
          description: Optional frontend highlighting flag.
    CreateLibraryRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - slug
        - description
        - language
        - template
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: GraphRAG Survey
        slug:
          type: string
          minLength: 3
          maxLength: 31
          pattern: ^[a-z][a-z0-9-]{2,30}$
          example: graphrag-survey
        description:
          type: string
          maxLength: 2000
          example: Literature collection for GraphRAG papers.
        language:
          type: string
          enum:
            - en
            - zh
            - multi
        template:
          type: string
          minLength: 1
          maxLength: 100
          description: Frontend-selected starter template key.
          example: blank
    CreateLibraryResponse:
      type: object
      additionalProperties: false
      required:
        - library
        - redirectTo
      properties:
        library:
          $ref: "#/components/schemas/LibrarySummary"
        redirectTo:
          type: string
          example: /libraries/graphrag-survey/docs?onboarding=1
    DocumentStatus:
      type: object
      additionalProperties: false
      required:
        - kind
        - label
        - title
        - message
        - meta
      properties:
        kind:
          type: string
          enum:
            - ready
            - indexing
            - parsing
            - failed
        label:
          type: string
          example: Ready
        title:
          type: string
          example: Document ready
        message:
          type: string
          example: Indexed and available for search, chat citations, and review generation.
        meta:
          type: string
          example: "Chunks: 128"
        progress:
          type: integer
          minimum: 0
          maximum: 100
        progressText:
          type: string
          example: 70%
        actionLabel:
          type: string
          example: Retry ingestion
    LibraryDocumentsSummary:
      type: object
      additionalProperties: false
      required:
        - libraryId
        - documentCountLabel
        - chunkCountLabel
        - lastSyncLabel
      properties:
        libraryId:
          type: string
          example: graphrag-survey
        documentCountLabel:
          type: string
          example: 2 documents
        chunkCountLabel:
          type: string
          example: 222 chunks
        lastSyncLabel:
          type: string
          example: Last sync 2026-05-27
    LibraryDocument:
      type: object
      additionalProperties: false
      required:
        - id
        - libraryId
        - title
        - authors
        - source
        - year
        - status
        - chunks
        - entities
        - ingestedLabel
      properties:
        id:
          type: string
          example: doc-001
        libraryId:
          type: string
          example: graphrag-survey
        title:
          type: string
          example: GraphRAG Paper
        authors:
          type: string
          description: Display-ready author list. Empty string when metadata is unavailable.
          example: Edge et al.
        source:
          type: string
          description: Display-ready source label, currently the uploaded file name when richer metadata is unavailable.
          example: graphrag.pdf
        year:
          type: integer
          description: Display year, using ingest year until publication metadata is available.
          example: 2026
        status:
          $ref: "#/components/schemas/DocumentStatus"
        chunks:
          type: integer
          nullable: true
          minimum: 0
          example: 128
        entities:
          type: integer
          nullable: true
          minimum: 0
          example: 94
        ingestedLabel:
          type: string
          example: Ingested 2026-05-27
    DocumentStatistic:
      type: object
      additionalProperties: false
      required:
        - label
        - value
      properties:
        label:
          type: string
          example: chunks
        value:
          type: string
          example: "128"
    DocumentSection:
      type: object
      additionalProperties: false
      required:
        - id
        - orderLabel
        - title
        - pageLabel
      properties:
        id:
          type: string
          example: abstract
        orderLabel:
          type: string
          example: "01"
        title:
          type: string
          example: Abstract and motivation
        pageLabel:
          type: string
          example: p.1
    DocumentChunk:
      type: object
      additionalProperties: false
      required:
        - id
        - locationLabel
        - text
      properties:
        id:
          type: string
          example: chunk-001
        locationLabel:
          type: string
          example: Methods / p.2
        text:
          type: string
          example: Graph summaries ground the final response.
    DocumentDetail:
      allOf:
        - $ref: "#/components/schemas/LibraryDocument"
        - type: object
          additionalProperties: false
          required:
            - fileFormat
            - fileSizeLabel
            - ingestedAtLabel
            - pageCount
            - selectedPage
            - statistics
            - sections
            - chunksPreview
          properties:
            fileFormat:
              type: string
              example: PDF
            fileSizeLabel:
              type: string
              description: Display-ready file size label. `Unknown` when storage metadata is unavailable.
              example: Unknown
            ingestedAtLabel:
              type: string
              example: 2026-05-27 10:45
            pageCount:
              type: integer
              minimum: 0
              example: 22
            selectedPage:
              type: integer
              minimum: 1
              example: 1
            statistics:
              type: array
              items:
                $ref: "#/components/schemas/DocumentStatistic"
            sections:
              type: array
              items:
                $ref: "#/components/schemas/DocumentSection"
            chunksPreview:
              type: array
              items:
                $ref: "#/components/schemas/DocumentChunk"
    DocumentsWorkspace:
      type: object
      additionalProperties: false
      required:
        - summary
        - documents
      properties:
        summary:
          $ref: "#/components/schemas/LibraryDocumentsSummary"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/LibraryDocument"
    DocumentMutationFeedback:
      type: object
      additionalProperties: false
      required:
        - tone
        - title
        - detail
      properties:
        tone:
          type: string
          enum:
            - success
            - info
            - warning
            - danger
          example: warning
        title:
          type: string
          example: Retry queued
        detail:
          type: string
          example: failed.pdf ingestion retry queued.
        action:
          type: string
          example: Logs
    DocumentUploadRequest:
      type: object
      additionalProperties: false
      required:
        - files
      properties:
        files:
          type: array
          minItems: 1
          description: One or more PDF files submitted under repeated multipart field name `files`.
          items:
            type: string
            format: binary
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - AUTH_ERROR
            - NOT_FOUND
            - LIBRARY_NOT_FOUND
            - LIBRARY_ALREADY_EXISTS
            - CONFLICT
            - PAYLOAD_TOO_LARGE
            - UNSUPPORTED_MEDIA_TYPE
            - RATE_LIMITED
            - UPSTREAM_ERROR
            - INTERNAL_ERROR
        message:
          type: string
        request_id:
          type: string
        details:
          nullable: true
          description: Optional machine-readable error context.
  parameters: {}
  responses:
    AuthError:
      description: Authentication or authorization failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    LibraryAlreadyExistsError:
      description: Library slug already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            duplicateSlug:
              value:
                code: LIBRARY_ALREADY_EXISTS
                message: "Library already exists: graphrag-survey"
                request_id: req_123
                details:
                  library_id: graphrag-survey
    LibraryNotFoundError:
      description: Library does not exist or is not visible to the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            missingLibrary:
              value:
                code: LIBRARY_NOT_FOUND
                message: "Library not found: graphrag-survey"
                request_id: req_123
                details:
                  library_id: graphrag-survey
    NotFoundError:
      description: Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            missingDocument:
              value:
                code: NOT_FOUND
                message: "Document not found: doc-001"
                request_id: req_123
    ConflictError:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            ingestionAlreadyRunning:
              value:
                code: CONFLICT
                message: "Document ingestion is already running: doc-001"
                request_id: req_123
    PayloadTooLargeError:
      description: Uploaded payload exceeds the configured size limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            pdfTooLarge:
              value:
                code: PAYLOAD_TOO_LARGE
                message: "Uploaded PDF exceeds max size 104857600 bytes: paper.pdf"
                request_id: req_123
    UnsupportedMediaTypeError:
      description: Uploaded file type is unsupported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            nonPdf:
              value:
                code: UNSUPPORTED_MEDIA_TYPE
                message: "Only PDF files are supported: notes.txt"
                request_id: req_123
    UpstreamError:
      description: Upstream dependency rejected the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  requestBodies: {}
  securitySchemes: {}
