    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - AUTH_ERROR
            - NOT_FOUND
            - LIBRARY_NOT_FOUND
            - LIBRARY_ALREADY_EXISTS
            - CONFLICT
            - PAYLOAD_TOO_LARGE
            - UNSUPPORTED_MEDIA_TYPE
            - RATE_LIMITED
            - UPSTREAM_ERROR
            - INTERNAL_ERROR
        message:
          type: string
        request_id:
          type: string
        details:
          nullable: true
          description: Optional machine-readable error context.
  parameters: {}
  responses:
    AuthError:
      description: Authentication or authorization failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    LibraryAlreadyExistsError:
      description: Library slug already exists.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            duplicateSlug:
              value:
                code: LIBRARY_ALREADY_EXISTS
                message: "Library already exists: graphrag-survey"
                request_id: req_123
                details:
                  library_id: graphrag-survey
    LibraryNotFoundError:
      description: Library does not exist or is not visible to the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            missingLibrary:
              value:
                code: LIBRARY_NOT_FOUND
                message: "Library not found: graphrag-survey"
                request_id: req_123
                details:
                  library_id: graphrag-survey
    NotFoundError:
      description: Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            missingDocument:
              value:
                code: NOT_FOUND
                message: "Document not found: doc-001"
                request_id: req_123
    ConflictError:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            ingestionAlreadyRunning:
              value:
                code: CONFLICT
                message: "Document ingestion is already running: doc-001"
                request_id: req_123
    PayloadTooLargeError:
      description: Uploaded payload exceeds the configured size limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            pdfTooLarge:
              value:
                code: PAYLOAD_TOO_LARGE
                message: "Uploaded PDF exceeds max size 104857600 bytes: paper.pdf"
                request_id: req_123
    UnsupportedMediaTypeError:
      description: Uploaded file type is unsupported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            nonPdf:
              value:
                code: UNSUPPORTED_MEDIA_TYPE
                message: "Only PDF files are supported: notes.txt"
                request_id: req_123
    UpstreamError:
      description: Upstream dependency rejected the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  requestBodies: {}
  securitySchemes: {}
