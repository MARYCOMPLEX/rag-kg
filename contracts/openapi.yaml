openapi: 3.0.3
info:
  title: AnyFast API
  version: 1.0.0
  description: Shared API contract for the AnyFast full-stack application.
servers:
  - url: http://localhost:8000
    description: Local backend development server
tags:
  - name: libraries
    description: Frontend library dashboard APIs.
  - name: auth
    description: Authentication and authorization APIs.
  - name: research
    description: Research workflow and agent APIs.
  - name: projects
    description: Project management APIs.
  - name: tasks
    description: Task planning and execution APIs.
paths:
  /api/libraries:
    get:
      tags:
        - libraries
      summary: List libraries for the frontend dashboard
      operationId: listFrontendLibraries
      responses:
        "200":
          description: Frontend library summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibrarySummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - libraries
      summary: Create a library from the frontend create modal
      operationId: createFrontendLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryRequest"
      responses:
        "201":
          description: Created library and frontend redirect target.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLibraryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/LibraryAlreadyExistsError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents:
    get:
      tags:
        - libraries
      summary: List frontend document workspace data for one library
      operationId: listFrontendLibraryDocuments
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
      responses:
        "200":
          description: Document workspace summary and rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentsWorkspace"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents/{documentId}:
    get:
      tags:
        - libraries
      summary: Get frontend document detail drawer data
      operationId: getFrontendLibraryDocument
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          example: doc-001
      responses:
        "200":
          description: Document detail data for the frontend drawer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents/{documentId}:retry:
    post:
      tags:
        - libraries
      summary: Queue a frontend document ingestion retry
      operationId: retryFrontendLibraryDocumentIngestion
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          example: doc-001
      responses:
        "202":
          description: Retry was accepted and queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentMutationFeedback"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/documents:upload:
    post:
      tags:
        - libraries
      summary: Upload one or more PDF documents for frontend ingestion
      operationId: uploadFrontendLibraryDocuments
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUploadRequest"
      responses:
        "202":
          description: Upload was accepted and queued for ingestion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentMutationFeedback"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "413":
          $ref: "#/components/responses/PayloadTooLargeError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaTypeError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/search:
    get:
      tags:
        - libraries
      summary: Search command palette results for one library context
      operationId: searchFrontendLibraryCommands
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
            default: ""
          description: User-entered command palette query. Blank or one-character queries return empty results.
          example: graph
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated scopes using documents, entities, libraries, and actions.
          example: documents,entities,actions
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: Command palette search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandSearchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/shell/metadata:
    get:
      tags:
        - libraries
      summary: Get dynamic shell metadata for one library context
      operationId: getFrontendShellMetadata
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
      responses:
        "200":
          description: Recent sessions, library stats, and optional shell metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShellMetadata"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/evaluation/dashboard:
    get:
      tags:
        - libraries
      summary: Get evaluation dashboard data for one library
      operationId: getFrontendEvaluationDashboard
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: dataset
          in: query
          required: false
          schema:
            type: string
            enum:
              - smoke
              - multihop
              - review
          description: Optional evaluation dataset or task-family key.
          example: smoke
        - name: timeRange
          in: query
          required: false
          schema:
            type: string
            enum:
              - 7d
              - 30d
              - 90d
            default: 30d
          description: Relative evaluation dashboard window.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive ISO start date for an explicit dashboard window.
          example: "2026-05-01"
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive ISO end date for an explicit dashboard window.
          example: "2026-05-27"
      responses:
        "200":
          description: Evaluation dashboard summary, filters, metrics, and settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationDashboard"
              examples:
                emptyDashboard:
                  value:
                    summary:
                      libraryId: rag-agent
                      libraryName: RAG Agent
                      datasetSummaryLabel: No evaluation data
                      timeRangeLabel: Last 30 days
                      lastRunLabel: null
                    filters:
                      datasets: []
                      timeRanges: []
                    budgetAlert: null
                    kpis: []
                    trend:
                      days: []
                      em: []
                      faithfulness: []
                      citation: []
                      latency: []
                      legend: []
                    failureCases: []
                    librarySettings:
                      libraryLabel: RAG Agent
                      models:
                        routerLabel: "Router: routed"
                        embeddingLabel: text-embedding-3-small (1536d)
                        warning: null
                      budgetLimits:
                        - key: maxInputTokens
                          label: LLM input tokens
                          value: "32,000"
                        - key: maxOutputTokens
                          label: LLM output tokens
                          value: "4,000"
                        - key: maxLlmCalls
                          label: Max LLM calls
                          value: "20"
                        - key: maxSteps
                          label: Max retrieval steps
                          value: "8"
                      dataActions:
                        canExport: true
                        canPurge: true
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/chat/session:
    get:
      tags:
        - libraries
      summary: Get the current frontend chat session for one library
      operationId: getFrontendChatSession
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: rag-agent
      responses:
        "200":
          description: Current chat session, with empty arrays when no conversation content exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
              examples:
                emptySession:
                  value:
                    sessionId: chat-session-1
                    title: New chat
                    createdAtLabel: "2026-05-27 18:00"
                    messages: []
                    evidence: []
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/chat/questions:
    post:
      tags:
        - libraries
      summary: Create a chat question and return a stream task
      operationId: createFrontendChatQuestion
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: rag-agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatQuestionRequest"
      responses:
        "202":
          description: Question accepted; connect to streamUrl for answer events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatQuestionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/chat/questions/{taskId}/events:
    get:
      tags:
        - libraries
      summary: Stream frontend chat answer events
      operationId: streamFrontendChatQuestionEvents
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: rag-agent
        - name: taskId
          in: path
          required: true
          schema:
            type: string
          example: chat-0123456789abcdef
      responses:
        "200":
          description: |
            Server-Sent Events for the accepted chat task.

            Event payloads:
            - `token`: JSON object `{ "token": "<text>" }`.
            - `citations`: JSON array of citation IDs matching `evidence[].id`.
            - `evidence`: JSON array of `ChatEvidence` records.
            - `status`: JSON object `{ "status": "idle|streaming|done|interrupted|unsubstantiated" }`.
            - `done`: JSON object with the terminal status.
            - `error`: JSON object `{ "code", "message", "request_id", "details" }`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ChatStreamEvent"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "503":
          $ref: "#/components/responses/UpstreamError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/graph:
    get:
      tags:
        - libraries
      summary: Get knowledge graph workspace data for one library
      operationId: getFrontendGraphWorkspace
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: entityTypes
          in: query
          required: false
          schema:
            type: string
          description: Optional comma-separated entity type keys to render.
          example: method,dataset
        - name: minConfidence
          in: query
          required: false
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 1
            default: 0
          description: Minimum triple confidence threshold.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          description: Maximum nodes returned in the canvas.
        - name: layout
          in: query
          required: false
          schema:
            type: string
            enum:
              - static
              - force
              - webgl
            default: static
      responses:
        "200":
          description: Graph filters, canvas data, and summary labels.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphWorkspace"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/LibraryNotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/libraries/{libraryId}/graph/entities/{entityId}:
    get:
      tags:
        - libraries
      summary: Get knowledge graph entity detail drawer data
      operationId: getFrontendGraphEntityDetail
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            type: string
          example: graphrag-survey
        - name: entityId
          in: path
          required: true
          schema:
            type: string
          example: method:graphrag
      responses:
        "200":
          description: Entity detail data for the frontend drawer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphEntityDetail"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - id
        - role
        - text
      properties:
        id:
          type: string
          example: user-0123456789abcdef
        role:
          type: string
          enum:
            - user
            - assistant
        text:
          type: string
          example: How does GraphRAG combine graph retrieval and synthesis?
        status:
          type: string
          enum:
            - idle
            - streaming
            - done
            - interrupted
            - unsubstantiated
        citations:
          type: array
          items:
            type: string
          example:
            - chunk-1
    ChatEvidence:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - type
        - title
        - meta
        - score
        - snippet
      properties:
        id:
          type: string
          example: chunk-1
        label:
          type: string
          example: "[1]"
        type:
          type: string
          example: chunk
        title:
          type: string
          example: "2210.03629"
        meta:
          type: string
          example: p.2
        score:
          type: string
          example: cited
        snippet:
          type: string
          example: Graph retrieval grounds the final synthesis.
    ChatSession:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - title
        - createdAtLabel
        - messages
        - evidence
      properties:
        sessionId:
          type: string
          example: chat-session-1
        title:
          type: string
          example: New chat
        createdAtLabel:
          type: string
          example: "2026-05-27 18:00"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ChatEvidence"
    ChatQuestionContext:
      type: object
      additionalProperties: false
      properties:
        evidenceIds:
          type: array
          items:
            type: string
          example:
            - chunk-1
        entityIds:
          type: array
          items:
            type: string
          example:
            - method:graphrag
    ChatQuestionRequest:
      type: object
      additionalProperties: false
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          example: How does GraphRAG answer grounded questions?
        sessionId:
          type: string
          minLength: 1
          maxLength: 64
          description: Existing chat session to continue. Omit to create a new session.
        context:
          $ref: "#/components/schemas/ChatQuestionContext"
    ChatQuestionResponse:
      type: object
      additionalProperties: false
      required:
        - taskId
        - streamUrl
        - userMessage
        - assistantMessage
        - evidence
      properties:
        taskId:
          type: string
          example: chat-0123456789abcdef
        streamUrl:
          type: string
          example: /api/libraries/rag-agent/chat/questions/chat-0123456789abcdef/events
        userMessage:
          $ref: "#/components/schemas/ChatMessage"
        assistantMessage:
          $ref: "#/components/schemas/ChatMessage"
        evidence:
          type: array
          description: Optional initial evidence records. Empty when evidence arrives through the stream.
          items:
            $ref: "#/components/schemas/ChatEvidence"
    ChatStreamEvent:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - token
          properties:
            token:
              type: string
        - type: array
          items:
            type: string
        - type: array
          items:
            $ref: "#/components/schemas/ChatEvidence"
        - type: object
          additionalProperties: false
          required:
            - status
          properties:
            status:
              type: string
              enum:
                - idle
                - streaming
                - done
                - interrupted
                - unsubstantiated
        - $ref: "#/components/schemas/ChatStreamDoneEvent"
        - $ref: "#/components/schemas/ErrorEnvelope"
    ChatStreamDoneEvent:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - idle
            - streaming
            - done
            - interrupted
            - unsubstantiated
    LibrarySummary:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - documentCountLabel
        - chunkCountLabel
        - entityCountLabel
        - activityLabel
        - statusLabel
        - status
        - accent
      properties:
        id:
          type: string
          description: Stable library slug used in frontend routes.
          example: graphrag-survey
        name:
          type: string
          example: GraphRAG Survey
        documentCountLabel:
          type: string
          description: Display-ready document count label.
          example: 0 documents
        chunkCountLabel:
          type: string
          description: Display-ready chunk count label.
          example: 0 chunks
        entityCountLabel:
          type: string
          description: Display-ready entity count label.
          example: 0 entities
        activityLabel:
          type: string
          description: Display-ready recent activity label.
          example: Created 2026-05-27
        statusLabel:
          type: string
          example: Healthy
        status:
          type: string
          enum:
            - healthy
            - indexing
        accent:
          type: string
          enum:
            - concept
            - method
            - dataset
            - citation
            - author
        featured:
          type: boolean
          description: Optional frontend highlighting flag.
    CreateLibraryRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - slug
        - description
        - language
        - template
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: GraphRAG Survey
        slug:
          type: string
          minLength: 3
          maxLength: 31
          pattern: ^[a-z][a-z0-9-]{2,30}$
          example: graphrag-survey
        description:
          type: string
          maxLength: 2000
          example: Literature collection for GraphRAG papers.
        language:
          type: string
          enum:
            - en
            - zh
            - multi
        template:
          type: string
          minLength: 1
          maxLength: 100
          description: Frontend-selected starter template key.
          example: blank
    CreateLibraryResponse:
      type: object
      additionalProperties: false
      required:
        - library
        - redirectTo
      properties:
        library:
          $ref: "#/components/schemas/LibrarySummary"
        redirectTo:
          type: string
          example: /libraries/graphrag-survey/docs?onboarding=1
    DocumentStatus:
      type: object
      additionalProperties: false
      required:
        - kind
        - label
        - title
        - message
        - meta
      properties:
        kind:
          type: string
          enum:
            - ready
            - indexing
            - parsing
            - failed
        label:
          type: string
          example: Ready
        title:
          type: string
          example: Document ready
        message:
          type: string
          example: Indexed and available for search, chat citations, and review generation.
        meta:
          type: string
          example: "Chunks: 128"
        progress:
          type: integer
          minimum: 0
          maximum: 100
        progressText:
          type: string
          example: 70%
        actionLabel:
          type: string
          example: Retry ingestion
    LibraryDocumentsSummary:
      type: object
      additionalProperties: false
      required:
        - libraryId
        - documentCountLabel
        - chunkCountLabel
        - lastSyncLabel
      properties:
        libraryId:
          type: string
          example: graphrag-survey
        documentCountLabel:
          type: string
          example: 2 documents
        chunkCountLabel:
          type: string
          example: 222 chunks
        lastSyncLabel:
          type: string
          example: Last sync 2026-05-27
    LibraryDocument:
      type: object
      additionalProperties: false
      required:
        - id
        - libraryId
        - title
        - authors
        - source
        - year
        - status
        - chunks
        - entities
        - ingestedLabel
      properties:
        id:
          type: string
          example: doc-001
        libraryId:
          type: string
          example: graphrag-survey
        title:
          type: string
          example: GraphRAG Paper
        authors:
          type: string
          description: Display-ready author list. Empty string when metadata is unavailable.
          example: Edge et al.
        source:
          type: string
          description: Display-ready source label, currently the uploaded file name when richer metadata is unavailable.
          example: graphrag.pdf
        year:
          type: integer
          description: Display year, using ingest year until publication metadata is available.
          example: 2026
        status:
          $ref: "#/components/schemas/DocumentStatus"
        chunks:
          type: integer
          nullable: true
          minimum: 0
          example: 128
        entities:
          type: integer
          nullable: true
          minimum: 0
          example: 94
        ingestedLabel:
          type: string
          example: Ingested 2026-05-27
    DocumentStatistic:
      type: object
      additionalProperties: false
      required:
        - label
        - value
      properties:
        label:
          type: string
          example: chunks
        value:
          type: string
          example: "128"
    DocumentSection:
      type: object
      additionalProperties: false
      required:
        - id
        - orderLabel
        - title
        - pageLabel
      properties:
        id:
          type: string
          example: abstract
        orderLabel:
          type: string
