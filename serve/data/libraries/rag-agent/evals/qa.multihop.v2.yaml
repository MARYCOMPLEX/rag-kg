$schema_version: "1"
suite: qa.multihop
suite_version: v2
library_id: rag-agent
description: >
  M2 multi-hop evaluation expanded to 30 questions covering all 15 ingested papers.
  Targets: cross-paper reasoning, specific entity recall, comparative claims,
  and domain-specific terminology that BM25 should catch better than vector alone.

samples:
  # === ReAct (2210.03629) ===
  - sample_id: mh-001
    question: "List all the benchmarks ReAct is evaluated on."
    difficulty: medium
    type: multi-hop
    expected_evidence_doc_ids: ["2210.03629"]
    expected_key_points: ["HotpotQA", "Fever", "ALFWorld", "WebShop"]
    acceptable_score_floor: 0.6
    human_validated: true

  - sample_id: mh-002
    question: "What language models are used in the ReAct experiments?"
