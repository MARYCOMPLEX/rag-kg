$schema_version: "1"
suite: qa.multihop
suite_version: v3
library_id: rag-agent
description: >
  v3 — corrects v2's 5 invalid questions whose papers turned out to have
  different content than expected (arxiv ID/title mismatches discovered
  during agent extraction):
    - 2412.15605 is CAG (not PaperQA2)
    - 2501.14998 is MKP-QA / Federated RAG (not LightRAG)
    - 2402.18439 is AutoForm (not OS-Copilot)
    - 2402.01030 is CodeAct (not Multi-Agent Survey)
    - 2407.21059 is Modular RAG (not Agentic IR)
  Removed: mh-019, mh-020, mh-023, mh-025, mh-026
  Added: mh-019b CAG, mh-020b MKP-QA, mh-023b AutoForm, mh-025b CodeAct, mh-026b Modular-RAG

samples:
