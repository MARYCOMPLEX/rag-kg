    difficulty: medium
    type: multi-hop
    expected_evidence_doc_ids: ["2210.03629"]
    expected_key_points: ["HotpotQA", "Fever", "ALFWorld", "WebShop"]
    acceptable_score_floor: 0.6
    human_validated: true

  - sample_id: mh-002
