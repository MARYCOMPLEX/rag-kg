$schema_version: "1"
suite: qa.multihop
suite_version: v1
library_id: rag-agent
description: >
  M2 multi-hop evaluation — questions that require connecting facts
  across multiple chunks/papers. Used to measure hybrid retrieval
  improvement over M1 baseline.

samples:
