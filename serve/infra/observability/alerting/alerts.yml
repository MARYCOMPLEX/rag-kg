groups:
  - name: rag_quality
    interval: 1m
    rules:
      - alert: rag_eval_pass_rate_drop
        expr: |
          (
            sum(rate(rag_eval_passed_total[24h]))
            /
            clamp_min(sum(rate(rag_eval_total_total[24h])), 1)
          )
          <
          (
            sum(rate(rag_eval_passed_total[24h] offset 24h))
            /
            clamp_min(sum(rate(rag_eval_total_total[24h] offset 24h)), 1)
          ) - 0.10
        for: 30m
        labels:
          severity: warning
          component: eval
        annotations:
          summary: "RAG eval pass rate dropped >10% vs prior 24h"
          description: "Pass rate over the last 24h is more than 10 percentage points below the prior 24h window. Investigate retrieval and prompt regressions."
          runbook_url: "https://example.com/runbooks/rag_eval_pass_rate_drop"

  - name: rag_performance
    interval: 1m
    rules:
      - alert: rag_llm_p95_latency_high
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(rag_llm_duration_seconds_bucket[5m]))
          ) > 60
        for: 10m
        labels:
          severity: warning
          component: llm
        annotations:
          summary: "LLM P95 latency >60s for 10m"
          description: "p95 latency for LLM calls has exceeded 60 seconds for the last 10 minutes. Check provider health and request batching."
          runbook_url: "https://example.com/runbooks/rag_llm_p95_latency_high"

      - alert: rag_llm_error_rate_high
        expr: |
          (
            sum(rate(rag_llm_errors_total[5m]))
            /
            clamp_min(sum(rate(rag_llm_requests_total[5m])), 1)
          ) > 0.10
        for: 5m
        labels:
          severity: critical
          component: llm
        annotations:
          summary: "LLM error rate >10% over 5m"
          description: "More than 10% of LLM requests are failing. Likely upstream outage, rate limiting, or auth failure. Page on-call."
          runbook_url: "https://example.com/runbooks/rag_llm_error_rate_high"

  - name: rag_cost
    interval: 5m
    rules:
      - alert: rag_embedding_cache_miss_high
        expr: |
          (
            sum(rate(rag_embedding_cache_miss_total[1h]))
            /
            clamp_min(sum(rate(rag_embedding_cache_requests_total[1h])), 1)
          ) > 0.50
        for: 1h
        labels:
          severity: info
          component: embedding
        annotations:
          summary: "Embedding cache miss rate >50% over 1h"
          description: "Cache miss rate is high; this drives unnecessary embedding API spend. Verify cache key normalization and retention."
          runbook_url: "https://example.com/runbooks/rag_embedding_cache_miss_high"
